<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智力答题挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 开始页面样式 */
        .start-screen {
            padding: 40px 20px;
            text-align: center;
        }

        .start-screen h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .start-screen p {
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .difficulty-select {
            margin: 20px 0;
        }

        .difficulty-btn {
            padding: 12px 24px;
            margin: 0 8px 10px;
            border: 2px solid #3498db;
            border-radius: 8px;
            background: white;
            color: #3498db;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #3498db;
            color: white;
        }

        .start-btn {
            padding: 15px 40px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .start-btn:hover {
            background: #27ae60;
        }

        /* 答题页面样式 */
        .quiz-screen {
            padding: 20px;
            display: none;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #34495e;
            font-size: 14px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-title {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            border-color: #3498db;
            background: #f0f7ff;
        }

        .option.correct {
            background: #f8f9fa;
            border-color: #2ecc71;
            color: #27ae60;
        }

        .option.incorrect {
            background: #ffebee;
            border-color: #e74c3c;
            color: #c0392b;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        /* 结果页面样式 */
        .result-screen {
            padding: 40px 20px;
            text-align: center;
            display: none;
        }

        .score-box {
            font-size: 48px;
            font-weight: bold;
            color: #3498db;
            margin: 20px 0;
        }

        .result-text {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        /* 响应式调整 */
        @media (max-width: 375px) {
            .question-title {
                font-size: 16px;
            }
            
            .option {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="start-screen" id="startScreen">
            <h1>智力答题挑战</h1>
            <p>选择难度开始答题，答错即结束挑战，每题10分，共10题！</p>
            
            <div class="difficulty-select">
                <button class="difficulty-btn active" data-level="easy">简单</button>
                <button class="difficulty-btn" data-level="medium">中等</button>
                <button class="difficulty-btn" data-level="hard">困难</button>
            </div>
            
            <button class="start-btn" id="startBtn">开始答题</button>
        </div>

        <!-- 答题页面 -->
        <div class="quiz-screen" id="quizScreen">
            <div class="progress">
                <span>题目 <span id="currentQuestion">1</span>/<span id="totalQuestions">10</span></span>
                <span>得分: <span id="score">0</span></span>
            </div>
            
            <div class="question-card">
                <div class="question-title" id="questionText">加载中...</div>
                
                <div class="options" id="optionsContainer">
                    <!-- 选项会通过JS动态生成 -->
                </div>
            </div>
            
            <button class="next-btn" id="nextBtn">下一题</button>
        </div>

        <!-- 结果页面 -->
        <div class="result-screen" id="resultScreen">
            <h1 id="resultTitle">答题完成！</h1>
            <div class="score-box" id="finalScore">0</div>
            <p class="result-text" id="resultText">你真棒！继续加油</p>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
    </div>

            shuffleArray(baseQuestions);
            
            // 确保有10道题（从扩充后的题库中随机选10道）
            currentQuestions = baseQuestions.slice(0, TOTAL_QUESTIONS);
            
            // 再次打乱，保证随机性
            shuffleArray(currentQuestions);
            
            // 重置状态
            currentQIndex = 0;
            score = 0;
            selectedOption = null;
            
            // 更新UI
            startScreen.style.display = "none";
            quizScreen.style.display = "block";
            scoreEl.textContent = score;
            totalQuestionsEl.textContent = TOTAL_QUESTIONS; // 固定显示10题
            
            // 显示第一题
            showQuestion(currentQuestions[currentQIndex]);
        }

        // 显示题目（增加彩蛋题逻辑）
        function showQuestion(question) {
            // 检查是否是第9题，并且判断是否触发彩蛋题（40%概率）
            let currentQuestion = question;
            if (currentQIndex + 1 === 9 && Math.random() < EASTER_EGG_PROBABILITY) {
                currentQuestion = easterEggQuestion;
            }
            
            // 重置选项状态
            optionsContainerEl.innerHTML = "";
            nextBtn.style.display = "none";
            selectedOption = null;
            
            // 更新题目信息
            currentQuestionEl.textContent = currentQIndex + 1;
            questionTextEl.textContent = currentQuestion.question;
            
            // 生成选项
            currentQuestion.options.forEach((option, index) => {
                const optionEl = document.createElement("div");
                optionEl.className = "option";
                optionEl.dataset.index = index;
                optionEl.textContent = option;
                
                // 选项点击事件
                optionEl.addEventListener("click", () => {
                    if (selectedOption !== null) return; // 防止重复选择
                    
                    selectedOption = index;
                    
                    // 判断是否正确
                    if (index === currentQuestion.answer) {
                        optionEl.classList.add("correct");
                        score += 10; // 每题10分
                        scoreEl.textContent = score;
                        // 显示下一题按钮
                        nextBtn.style.display = "block";
                    } else {
                        optionEl.classList.add("incorrect");
                        // 显示正确答案
                        const correctOptionEl = optionsContainerEl.querySelector(`[data-index="${currentQuestion.answer}"]`);
                        correctOptionEl.classList.add("correct");
                        
                        // 答错直接显示结果页面，终止答题
                        setTimeout(() => {
                            showResult(false); // 传入false表示答错终止
                        }, 1000); // 延迟1秒显示结果，让用户看到对错反馈
                    }
                });
                
                optionsContainerEl.appendChild(optionEl);
            });
        }

        // 显示下一题
        function showNextQuestion() {
            currentQIndex++;
            
            // 检查是否还有题目
            if (currentQIndex < TOTAL_QUESTIONS) {
                showQuestion(currentQuestions[currentQIndex]);
            } else {
                // 答题结束，全部答对
                showResult(true);
            }
        }

        // 显示结果（按得分匹配文案）
        function showResult(isAllCorrect) {
            quizScreen.style.display = "none";
            resultScreen.style.display = "block";
            
            // 更新结果信息
            finalScoreEl.textContent = score;
            
            // 根据答题情况显示不同标题和评语
            if (!isAllCorrect) {
                resultTitleEl.textContent = "挑战失败！";
                resultTitleEl.style.color = "#e74c3c";
                
                // 按得分匹配对应的趣味文案
                resultTextEl.textContent = scoreTexts[score] || `很遗憾！最终得分：${score}分`;
            } else {
                resultTitleEl.textContent = "挑战成功！";
                resultTitleEl.style.color = "#2c3e50";
                // 满分显示"你已飞升"
                resultTextEl.textContent = scoreTexts[score];
            }
        }

        // 重置答题
        function resetQuiz() {
            resultScreen.style.display = "none";
            startScreen.style.display = "block";
            // 重置结果标题样式
            resultTitleEl.textContent = "答题完成！";
            resultTitleEl.style.color = "#2c3e50";
        }

        // 辅助函数：打乱数组
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
</body>
